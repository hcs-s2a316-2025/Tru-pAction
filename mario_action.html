<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>Trump Action - Stage Select Update</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: #000; color: #fff; font-family: 'monospace', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* ステージセレクトUI */
        #select-container { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; z-index: 10; }
        #select-container label { font-size: 16px; font-weight: bold; color: #ffeb3b; text-shadow: 1px 1px #000; }
        #stage-dropdown { padding: 6px 12px; font-size: 16px; font-weight: bold; background: #222; color: #fff; border: 2px solid #fff; border-radius: 4px; cursor: pointer; }
        #stage-dropdown:focus { outline: none; border-color: #e91e63; }
        #select-btn { background: #00a800; color: white; border: none; padding: 6px 15px; font-size: 16px; font-weight: bold; border-radius: 4px; border-bottom: 3px solid #006600; cursor: pointer; }
        #select-btn:hover { filter: brightness(1.1); }

        #game-container { position: relative; border: 4px solid #fff; box-shadow: 0 0 20px rgba(255,255,255,0.3); width: 800px; height: 448px; }
        
        /* 背景ぼかし */
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; filter: blur(6px); }
        #action-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: transparent; }
        
        .hud { position: absolute; top: 15px; left: 0; width: 100%; display: flex; justify-content: space-around; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 2; pointer-events: none; }
        
        .screen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; }
        .screen-overlay h2 { font-size: 36px; margin-bottom: 20px; color: #ffeb3b; text-align: center; }
        .screen-overlay p { font-size: 16px; margin-bottom: 30px; color: #bbb; text-align: center; line-height: 1.6; white-space: pre-line; }
        .start-btn { background: #e91e63; color: white; border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border-bottom: 4px solid #ad1457; }
        .start-btn:hover { filter: brightness(1.1); }
    </style>
</head>

                    { x: 1250, y: 48, w: 96, h: 192, type: "castle" },
                    { x: 1800, y: GROUND_Y - 160, w: 64, h: 160, type: "castle" },
                    { x: 2300, y: 48, w: 128, h: 160, type: "castle" }
                ],
                bridge: { x: 2800, y: GROUND_Y, w: 250, h: 16, type: "bridge" },
                fireBars: [
                    { cx: 450, cy: GROUND_Y - 48, angle: 0, length: 7, speed: 0.055 },
                    { cx: 800, cy: GROUND_Y - 128, angle: Math.PI, length: 6, speed: -0.05 },
                    { cx: 1200, cy: 100, angle: 0, length: 7, speed: 0.06 },
                    { cx: 1500, cy: GROUND_Y - 48, angle: Math.PI/2, length: 6, speed: 0.05 },
                    { cx: 1700, cy: 120, angle: Math.PI, length: 6, speed: -0.055 },
                    { cx: 2000, cy: GROUND_Y - 48, angle: 0, length: 7, speed: 0.06 },
                    { cx: 2250, cy: GROUND_Y - 128, angle: Math.PI/4, length: 6, speed: -0.055 },
                    { cx: 2500, cy: GROUND_Y - 48, angle: 0, length: 7, speed: 0.065 }
                ],
                bowser: { x: 2850, y: GROUND_Y - 64, w: 64, h: 64, vx: -2.0, dir: -1, hp: 12, isAlive: true },
                axeTrigger: { x: 3070, y: GROUND_Y - 40, w: 32, h: 40 }
            }
        };

        let keys = { Space: false, ArrowLeft: false, ArrowRight: false, ShiftLeft: false, ShiftRight: false, ArrowDown: false, KeyS: false };
        window.addEventListener("keydown", e => { 
            if (e.code in keys) keys[e.code] = true; 
            if (e.code === "ShiftLeft" || e.code === "ShiftRight") keys.ShiftLeft = true;
            if (e.code === "ArrowDown") keys.ArrowDown = true;
            if (e.code === "KeyS") keys.KeyS = true;
            if (e.code === "Space") keys.Space = true;
            
            if (e.code === "Enter" && !gameActive && document.getElementById("overlay").style.display !== "none") {
                initGameStage();
            }
        });
        window.addEventListener("keyup", e => { 
            if (e.code in keys) keys[e.code] = false; 
            if (e.code === "ShiftLeft" || e.code === "ShiftRight") keys.ShiftLeft = false;
            if (e.code === "ArrowDown") keys.ArrowDown = false;
            if (e.code === "KeyS") keys.KeyS = false;
            if (e.code === "Space") keys.Space = false;
        });

        function applySelectedStage() {
            const dropdown = document.getElementById("stage-dropdown");
            const val = dropdown.value.split("-");
            currentWorld = parseInt(val[0]);
            currentStage = parseInt(val[1]);
            
            if (document.activeElement) {
                document.activeElement.blur();
            }

            initGameStage();
        }

        function syncDropdownValue() {
            document.getElementById("stage-dropdown").value = `${currentWorld}-${currentStage}`;
        }

        // ==========================================
        // 🏗️ マップ生成ロジック（整理して読み込みを統合）
        // ==========================================
        function generateWorld1Map() {
            platforms = []; coinsArray = []; enemies = []; fireBars = []; bowser = null; bowserBridge = null; axeTrigger = null;
            cameraX = 0; backgroundPlane.x = 900;

            const data = STAGE_DATA[`${currentWorld}-${currentStage}`];
            if (!data) return;

            levelWidth = data.levelWidth;

            // 1. 基本の足場を配置
            if (data.platforms) {
                platforms = [...data.platforms];
            }

            // 2. ブロック列を生成
            if (data.blockRows) {
                data.blockRows.forEach(row => {
                    createBlockRow(row.startX, row.y, row.count, row.type);
                });
            }

            // 3. 階段を生成
            if (data.stairs) {
                data.stairs.forEach(st => {
                    createStairs(st.startX, st.steps, st.isGoingUp);
                });
            }

            // 4. 大樹ステージの特殊処理（treePlats）
            if (data.treePlats) {
                data.treePlats.forEach(tp => {
                    platforms.push({ x: tp.x, y: tp.y, w: tp.w, h: 24, type: "tree" });
                    if (Math.random() < data.coinRatio) {
                        coinsArray.push({ x: tp.x + tp.w/2 - 7, y: tp.y - 30, collected: false });
                    }
                });
            }

            // 5. 敵キャラクターを配置
            if (data.enemies) {
                // ディープコピーして元のデータを汚染しないようにする
                enemies = data.enemies.map(e => ({...e}));
            }

            // 6. クッパ城ステージ用の特殊オブジェクト
            if (data.bridge) bowserBridge = {...data.bridge};
            if (data.fireBars) fireBars = data.fireBars.map(f => ({...f}));
            if (data.bowser) bowser = {...data.bowser};
            if (data.axeTrigger) axeTrigger = {...data.axeTrigger};

            // 7. ゴールポールの配置（クッパ城以外）
            if (currentStage !== 4 && data.goalX) {
                goalPole.x = data.goalX; 
                goalPole.y = GROUND_Y - goalPole.h;
            }
        }

        function createBlockRow(startX, y, count, type="block") {
            for (let i = 0; i < count; i++) {
                let bx = startX + (i * 32);
                platforms.push({ x: bx, y: y, w: 32, h: 32, type: type });
                if (Math.random() < 0.3) coinsArray.push({ x: bx + 8, y: y - 28, collected: false });
            }
        }

        function createStairs(startX, steps, isGoingUp) {
            const size = 32;
            for (let i = 1; i <= steps; i++) {
                let x = isGoingUp ? startX + (i - 1) * size : startX + (steps - i) * size;
                let h = i * size;
                platforms.push({ x: x, y: GROUND_Y - h, w: size, h: h, type: "block" });
            }
        }

        function initGameStage() {
            document.getElementById("overlay").style.display = "none";
            document.getElementById("stage-val").innerText = `${currentWorld}-${currentStage}`;
            
            syncDropdownValue();

            player.x = 60;
            player.y = 200;
            player.vx = 0;
            player.vy = 0;
            player.isGrounded = false;
            player.onPassableFloor = false;

            generateWorld1Map();

            stageTimer = currentStage === 4 ? 300 : 400;
            gameActive = true;

            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                if (gameActive) {
                    stageTimer--;
                    document.getElementById("time-val").innerText = stageTimer;
                    if (stageTimer <= 0) handleGameOver();
                }
            }, 1000);

            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameActive) return;
            update();
            drawBackground();
            drawAction();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            backgroundPlane.x -= backgroundPlane.speed;
            if (backgroundPlane.x < -150) backgroundPlane.x = SCREEN_WIDTH + 200;

            let maxSpeed = keys.ShiftLeft ? 7.0 : 4.5; 
            let accel = player.isGrounded ? 0.8 : 0.6; 

            if (keys.ArrowLeft) {
                player.vx = Math.max(-maxSpeed, player.vx - accel);
                player.facing = -1;
            } else if (keys.ArrowRight) {
                player.vx = Math.min(maxSpeed, player.vx + accel);
                player.facing = 1;
            } else {
                player.vx *= player.isGrounded ? 0.75 : 0.92;
            }

            // 通常のジャンプ処理
            if (keys.Space && player.isGrounded) {
                player.vy = keys.ShiftLeft ? -16.5 : -14.5; 
                player.isGrounded = false;
            }
            if (!keys.Space && player.vy < -5.0) {
                player.vy = -5.0;
            }

            // ボス手前の足場でスペース長押しによる飛翔ギミック
            if (currentWorld === 3 && currentStage === 4 && player.onPassableFloor && keys.Space) {
                player.vy = -6.5; // 上昇速度を維持して自由に飛べる
                player.isGrounded = false;
            }

            // すり抜け床の下降り処理 (ArrowDown or S)
            if (currentWorld === 3 && currentStage === 4 && (keys.ArrowDown || keys.KeyS)) {
                platforms.forEach(p => {
                    if (p.type === "passable_floor") {
                        if (player.x + player.w > p.x && player.x < p.x + p.w) {
                            if (player.y + player.h >= p.y - 10 && player.y <= p.y + p.h + 10) {
                                player.y = p.y + p.h + 5; 
                                player.vy = 4; 
                                player.isGrounded = false;
                                player.onPassableFloor = false;
                            }
                        }
                    }
                });
            }

            player.vy += GRAVITY;
            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) player.x = 0;

            player.isGrounded = false;
            
            // ループの前に一度飛行用フラグをチェック（足場から外れたら切るため）
            let stillOnFloor = false;

            let activePlatforms = [...platforms];
            if (bowserBridge) activePlatforms.push(bowserBridge);

            for (let p of activePlatforms) {
                if (p.type === "passable_floor" && (keys.ArrowDown || keys.KeyS)) continue;

                if (player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h > p.y && player.y < p.y + p.h) {
                    
                    if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 10) {
                        player.y = p.y - player.h; player.vy = 0; player.isGrounded = true;
                        
                        // 該当の特殊足場に着地した際にフラグをONにする
                        if (p.type === "passable_floor") {
                            stillOnFloor = true;
                        }
                    } else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 10) {
                        player.y = p.y + p.h; player.vy = 0;
                    } else {
                        if (player.vx > 0) player.x = p.x - player.w;
                        if (player.vx < 0) player.x = p.x + p.w;
                    }
                }
            }
            
            // X座標が足場の範囲内かつ着地していれば飛行能力を維持
            if (stillOnFloor) {
                player.onPassableFloor = true;
            } else if (player.isGrounded === false && player.vy > 0) {
                platforms.forEach(p => {
                    if (p.type === "passable_floor" && player.x + player.w > p.x && player.x < p.x + p.w) {
                        if (player.y + player.h <= p.y + 2) stillOnFloor = true; 
                    }
                });
                if (!stillOnFloor) player.onPassableFloor = false;
            }

            if (player.y > SCREEN_HEIGHT) { 
                handleGameOver(); 
                return; 
            }

            if (cameraX > levelWidth - SCREEN_WIDTH) cameraX = levelWidth - SCREEN_WIDTH;

            if (player.x > cameraX + SCREEN_WIDTH / 2) {
                cameraX = player.x - SCREEN_WIDTH / 2;
                if (cameraX > levelWidth - SCREEN_WIDTH) cameraX = levelWidth - SCREEN_WIDTH;
            }

            for (let c of coinsArray) {
                if (!c.collected && player.x + player.w > c.x && player.x < c.x + 16 &&
                    player.y + player.h > c.y && player.y < c.y + 16) {
                    c.collected = true; coins++; score += 200;
                    document.getElementById("coin-val").innerText = String(coins).padStart(2, '0');
                    document.getElementById("score-val").innerText = String(score).padStart(6, '0');
                }
            }

            for (let fb of fireBars) {
                fb.angle += fb.speed;
                for (let i = 0; i < fb.length; i++) {
                    let ballX = fb.cx + Math.cos(fb.angle) * (i * 16);
                    let ballY = fb.cy + Math.sin(fb.angle) * (i * 16);
                    if (player.x + player.w > ballX - 6 && player.x < ballX + 6 &&
                        player.y + player.h > ballY - 6 && player.y < ballY + 6) {
                        handleGameOver(); return;
                    }
                }
            }

            for (let e of enemies) {
                if (!e.isAlive) continue;

                e.vy += GRAVITY;
                e.x += e.vx;
                e.y += e.vy;

                for (let p of platforms) {
                    if (e.x + e.w > p.x && e.x < p.x + p.w && e.y + e.h > p.y && e.y < p.y + p.h) {
                        if (e.vy > 0 && e.y + e.h - e.vy <= p.y + 8) {
                            e.y = p.y - e.h;
                            e.vy = 0;
                        } else {
                            e.vx *= -1; e.x += e.vx;
                        }
                    }
                }

                if (e.y > SCREEN_HEIGHT) {
                    e.isAlive = false;
                    continue; 
                }

                if (player.x + player.w > e.x && player.x < e.x + e.w &&
                    player.y + player.h > e.y && player.y < e.y + e.h) {
                    if (player.vy > 0 && player.y + player.h - player.vy <= e.y + 10) {
                        e.isAlive = false; player.vy = -8; score += 100;
                        document.getElementById("score-val").innerText = String(score).padStart(6, '0');
                    } else {
                        handleGameOver(); return;
                    }
                }
            }

            if (bowser && bowser.isAlive) {
                bowser.x += bowser.vx;
                let minX = currentWorld === 3 ? 2700 : (currentWorld === 2 ? 2600 : 2480);
                let maxX = currentWorld === 3 ? 2950 : (currentWorld === 2 ? 2850 : 2680);
                if (bowser.x < minX || bowser.x > maxX) bowser.vx *= -1;
                
                if (player.x + player.w > bowser.x && player.x < bowser.x + bowser.w &&
                    player.y + player.h > bowser.y && player.y < bowser.y + bowser.h) {
                    handleGameOver(); return;
                }
            }

            if (axeTrigger && player.x + player.w > axeTrigger.x && player.x < axeTrigger.x + axeTrigger.w &&
                player.y + player.h > axeTrigger.y && player.y < axeTrigger.y + axeTrigger.h) {
                bowserBridge = null;
                if (bowser) { bowser.isAlive = false; bowser.y = 999; }
                setTimeout(() => { handleStageClear(); }, 1000);
                axeTrigger = null;
            }

            if (currentStage !== 4 && player.x + player.w > goalPole.x && player.x < goalPole.x + goalPole.w) {
                handleStageClear();
            }
        }

        function handleStageClear() {
            gameActive = false; clearInterval(timerId);
            score += stageTimer * 10;
            document.getElementById("score-val").innerText = String(score).padStart(6, '0');

            if (currentStage < 4) {
                currentStage++;
                document.getElementById("overlay-title").innerText = "STAGE CLEAR!";
                document.getElementById("overlay-text").innerText = `ドナルド、次の作戦へ進みます。\n次はステージ ${currentWorld}-${currentStage} です。\n【Enterキー】で進発！`;
            } else {
                if (currentWorld === 1) {
                    currentWorld = 2;
                    currentStage = 1;
                    document.getElementById("overlay-title").innerText = "WORLD 1 CLEARED!";
                    document.getElementById("overlay-text").innerText = `作戦第二段階へ移行します。\n舞台はさらに険しい【WORLD 2-1】へ。\n【Enterキー】で未踏の地へ進発！`;
                } else if (currentWorld === 2) {
                    currentWorld = 3;
                    currentStage = 1;
                    document.getElementById("overlay-title").innerText = "WORLD 2 CLEARED!";
                    document.getElementById("overlay-text").innerText = `最終作戦段階（ファイナルフェーズ）へ移行します。\n最高難度を誇る【WORLD 3-1】へ。\n【Enterキー】で決戦の地へ進発！`;
                } else {
                    document.getElementById("overlay-title").innerText = "🇺🇸 ALL WORLD COMPLETION 🇺🇸";
                    document.getElementById("overlay-text").innerText = `全3ワールド・計12ステージを完全攻略しました！\n世界に真の平和が訪れました。あなたは伝説の大統領です！\n【Enterキー】で凱旋プレイ（最初から）へ。`;
                    currentWorld = 1;
                    currentStage = 1;
                }
            }
            
            syncDropdownValue();
            
            document.getElementById("overlay-btn").innerText = "Enterを押して次へ";
            document.getElementById("overlay").style.display = "flex";
        }

        function handleGameOver() {
            gameActive = false; clearInterval(timerId);
            document.getElementById("overlay-title").innerText = "NEVER GIVE UP";
            document.getElementById("overlay-title").style.color = "#f44336";
            document.getElementById("overlay-text").innerText = `ステージ ${currentWorld}-${currentStage} で一時撤退を余儀なくされました。\n【Enterキー】を押して不屈の精神でリトライ！`;
            document.getElementById("overlay-btn").innerText = "Enterでリトライ";
            document.getElementById("overlay").style.display = "flex";
        }

        function drawBackground() {
            bgCtx.clearRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
            if (currentStage === 2) bgCtx.fillStyle = "#000000";
            else if (currentStage === 4) bgCtx.fillStyle = "#1a001a";
            else bgCtx.fillStyle = "#5c94fc";
            bgCtx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

            bgCtx.save();
            bgCtx.translate(-cameraX * 0.2, 0);
            for (let i = 0; i < 30; i++) {
                let bx = i * 280 + 40;
                bgCtx.fillStyle = currentStage === 2 ? "#111" : (currentStage === 4 ? "#2a142e" : "#2c3e50");
                bgCtx.fillRect(bx, 100, 110, SCREEN_HEIGHT);
                bgCtx.fillStyle = currentStage === 4 ? "#990033" : "#f1c40f";
                for(let wy = 130; wy < SCREEN_HEIGHT - 60; wy += 40) {
                    bgCtx.fillRect(bx + 25, wy, 15, 20);
                    bgCtx.fillRect(bx + 70, wy, 15, 20);
                }
            }
            bgCtx.restore();

            bgCtx.save();
            bgCtx.translate(-cameraX * 0.4, 0);
            let px = backgroundPlane.x + cameraX * 0.4;
            bgCtx.fillStyle = currentStage === 4 ? "#ff3333" : "#ffffff";
            bgCtx.fillRect(px, backgroundPlane.y, 75, 16);
            bgCtx.fillRect(px + 40, backgroundPlane.y - 12, 14, 40);
            bgCtx.restore();
        }

        function drawAction() {
            ctx.clearRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
            ctx.save();
            ctx.translate(-cameraX, 0);

            for (let p of platforms) {
                if (p.type === "ground") ctx.fillStyle = "#c84c0c";
                else if (p.type === "underground") ctx.fillStyle = "#0044aa"; 
                else if (p.type === "tree") ctx.fillStyle = "#4caf50";
                else if (p.type === "castle" || p.type === "passable_floor") ctx.fillStyle = "#555555"; 
                else if (p.type === "pipe") ctx.fillStyle = "#00a800";
                else ctx.fillStyle = "#d35400";

                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5; ctx.strokeRect(p.x, p.y, p.w, p.h);
            }

            if (bowserBridge) {
                ctx.fillStyle = "#ffaa00"; ctx.fillRect(bowserBridge.x, bowserBridge.y, bowserBridge.w, bowserBridge.h);
                ctx.strokeRect(bowserBridge.x, bowserBridge.y, bowserBridge.w, bowserBridge.h);
            }

            for (let fb of fireBars) {
                for (let i = 0; i < fb.length; i++) {
                    let ballX = fb.cx + Math.cos(fb.angle) * (i * 16);
                    let ballY = fb.cy + Math.sin(fb.angle) * (i * 16);
                    ctx.fillStyle = "#ff4500"; ctx.beginPath(); ctx.arc(ballX, ballY, 7, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(ballX, ballY, 4, 0, Math.PI*2); ctx.fill();
                }
            }

            for (let c of coinsArray) {
                if (!c.collected) {
                    ctx.fillStyle = "#ffd700"; ctx.fillRect(c.x, c.y, 14, 16);
                    ctx.fillStyle = "#fff"; ctx.fillRect(c.x+2, c.y+2, 10, 12);
                }
            }

            for (let e of enemies) {
                if (e.isAlive) {
                    ctx.fillStyle = "#e67e22"; 
                    ctx.fillRect(e.x, e.y, e.w, e.h);
                    ctx.strokeStyle = "#000"; ctx.lineWidth = 1; ctx.strokeRect(e.x, e.y, e.w, e.h);
                    
                    ctx.fillStyle = "#ffffff"; 
                    ctx.fillRect(e.x + 4, e.y + 4, 4, 8);
                    ctx.fillRect(e.x + 16, e.y + 4, 4, 8);
                    ctx.fillStyle = "#000000";
                    ctx.fillRect(e.x + 5, e.y + 6, 2, 4);
                    ctx.fillRect(e.x + 17, e.y + 6, 2, 4);
                }
            }

            if (bowser && bowser.isAlive) {
                ctx.fillStyle = "#008800"; ctx.fillRect(bowser.x, bowser.y, bowser.w, bowser.h);
                ctx.fillStyle = "#ffaa00"; ctx.fillRect(bowser.x + 10, bowser.y + 10, 20, 20);
                ctx.fillStyle = "#ff0000"; ctx.fillRect(bowser.x + 45, bowser.y + 15, 10, 10);
            }

            if (axeTrigger) {
                ctx.fillStyle = "cyan"; ctx.fillRect(axeTrigger.x, axeTrigger.y, axeTrigger.w, axeTrigger.h);
                ctx.fillStyle = "#fff"; ctx.font = "12px sans-serif"; ctx.fillText("🪓", axeTrigger.x + 6, axeTrigger.y + 24);
            }

            if (currentStage !== 4) {
                ctx.fillStyle = "#eee"; ctx.fillRect(goalPole.x, goalPole.y, goalPole.w, goalPole.h);
                ctx.fillStyle = "#e63946"; ctx.fillRect(goalPole.x + goalPole.w, goalPole.y + 10, 45, 25);
            }

            ctx.save();
            ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
            ctx.scale(player.facing, 1);
            
            ctx.fillStyle = "#0f2042"; ctx.fillRect(-player.w / 2, -player.h / 2 + 10, player.w, player.h - 10);
            ctx.fillStyle = "#ffffff"; ctx.fillRect(-4, -player.h / 2 + 10, 8, 8);
            ctx.fillStyle = "#cc0000"; ctx.fillRect(-1.5, -player.h / 2 + 12, 3, 14);
            ctx.fillStyle = "#ffcc99"; ctx.fillRect(-player.w / 2 + 4, -player.h / 2, player.w - 8, 11);
            ctx.fillStyle = "#f1c40f"; ctx.fillRect(-player.w / 2 + 2, -player.h / 2 - 3, player.w - 2, 5);
            ctx.restore();

            ctx.restore();
        }
    </script>
